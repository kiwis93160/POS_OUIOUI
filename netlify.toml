[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@supabase/supabase-js"]

[dev]
  command = "npm run dev"
  port = 5173
  functionsPort = 8888

[context.production.environment]
  VITE_NETLIFY_FUNCTIONS_BASE = "/.netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
